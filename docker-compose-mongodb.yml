version: '3'

services:
  mongo:
    image: mongo:latest
    container_name: mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: MongoDB2019!
    ports:
      - "27017:27017"
    networks:
      - my_network
    volumes:
      - mongodb_data:/data
volumes:
  mongodb_data:
    driver: local      
networks:
  my_network:
    driver: bridge